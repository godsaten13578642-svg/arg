<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relay Chat</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="panel">
    <div class="chat-head">
      <h2>Relay Chat</h2>
      <details class="rank-details">
        <summary class="tiny-btn">(i) rank colors</summary>
        <div class="rank-modal-card">
          <div class="chat-head">
            <p><strong>Rank Color Key</strong></p>
            <button id="rankInfoClose" class="btn ghost tiny-btn" type="button">close</button>
          </div>
          <ul id="rankLegendList"></ul>
        </div>
      </details>
    </div>
    <p class="muted">Shared local chat. Owner appears as <code>ORPHEUS_CEO</code>.</p>

    <div id="chat-log" class="chat-log"></div>

    <form id="chat-form" class="login-grid">
      <label for="chat-input">message</label>
      <input id="chat-input" maxlength="280" required />
      <button class="btn" type="submit">Send</button><span></span>
    </form>

    <p><a href="terminal.html">← back to terminal</a></p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
  <script src="shared-store.js"></script>
  <script src="auth-session.js"></script>
  <script src="chat.js"></script>
</body>
</html>
