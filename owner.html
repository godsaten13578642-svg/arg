<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Owner Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="panel">
    <h2>Owner Dashboard</h2>
    <p class="muted">Visible only to owner account. User list + progress analytics.</p>

    <table class="users-table" id="users-table">
      <thead>
        <tr>
          <th>User</th><th>Rank</th><th>Level</th><th>Sessions</th><th>Final</th><th>Overrides</th><th>Chat</th><th>Last Seen</th>
        </tr>
      </thead>
      <tbody id="users-body"></tbody>
    </table>

    <div class="btn-row">
      <button id="ownerLogout" class="btn ghost" type="button">Log Out</button>
      <a class="btn ghost" href="chat.html">Open Chat</a>
    </div>
  </main>

  <script src="auth-session.js"></script>
  <script src="owner-dashboard.js"></script>
</body>
</html>
