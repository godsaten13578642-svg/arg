services:
  - type: web
    name: orpheus-arg
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: ORPHEUS_DATA_FILE
        value: /var/data/global-state.json
    disk:
      name: orpheus-data
      mountPath: /var/data
      sizeGB: 1
